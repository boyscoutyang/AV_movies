		function searchMatchedVideo(array_search_words, videos) {
			var video_matched = [];
			for(var i=0;i<videos.length;i++)
			{
				var matched = true;
				getVideoInfo(i);
				for(var j=0;j<array_search_words.length&&matched;j++) {
					if(array_search_words[j].match(/^-?(title|actor|num|maker|date|genre):.+/)) {
						var asw_regex = new RegExp(array_search_words[j].replace(/^-?(title|actor|num|maker|date|genre):/, ""), 'i');
						if(array_search_words[j].match(/^title:/) && !title.match(asw_regex))
							matched = false;
						else if(array_search_words[j].match(/^actor:/) && !actor.match(asw_regex))
							matched = false;
						else if(array_search_words[j].match(/^num:/) && !num.match(asw_regex))
							matched = false;
						else if(array_search_words[j].match(/^maker:/) && !maker.match(asw_regex))
							matched = false;
						else if(array_search_words[j].match(/^date:/) && !date.match(asw_regex))
							matched = false;
						else if(array_search_words[j].match(/^genre:/) && !genre.match(asw_regex))
							matched = false;
						else if(array_search_words[j].match(/^-title:/) && title.match(asw_regex))
							matched = false;
						else if(array_search_words[j].match(/^-actor:/) && actor.match(asw_regex))
							matched = false;
						else if(array_search_words[j].match(/^-num:/) && num.match(asw_regex))
							matched = false;
						else if(array_search_words[j].match(/^-maker:/) && maker.match(asw_regex))
							matched = false;
						else if(array_search_words[j].match(/^-date:/) && date.match(asw_regex))
							matched = false;
						else if(array_search_words[j].match(/^-genre:/) && genre.match(asw_regex))
							matched = false;
					}
					else if(array_search_words[j].match(/^-.+/)) {
						var asw_regex = new RegExp(array_search_words[j].replace(/^-/, ""), 'i');
						var all_info = path + " " + title + " " + actor + " " + num + " " + maker + " " + date + " " + genre;
						if(all_info.match(asw_regex))
							matched = false;
					}
					else {
						var asw_regex = new RegExp(array_search_words[j], 'i');
						var all_info = path + " " + title + " " + actor + " " + num + " " + maker + " " + date + " " + genre;
						if(!all_info.match(asw_regex))
							matched = false;
					}
				}
				if(matched) video_matched.push(i);
			}
			return video_matched;
		}

		function trimString(str) {
			str=str.replace(/[$^&*(){}<>",;=?`、（）]/g," ");
			str=str.replace(/\+|\\|\/|\||\[|\]/g, " ");
			str=str.replace(/^\s+/,"");
			str=str.replace(/\s+$/,"");
			str=str.replace(/\s{2,}/g," ");
			return str;
		}

		function getUrlPram() {
			var str_param;
			var param_arg;
			var iParam;

			str_param=document.location.search;
			if (str_param=="") return;

			if(str_param.charAt(0)=="?") str_param=str_param.substring(1,str_param.length);
			param_arg=str_param.split("&");

			for(iParam=0;iParam<param_arg.length;iParam++) {
				param_arg_values=param_arg[iParam].split("=");
				param_name=unescape(param_arg_values[0]);

				switch (param_name) {
					case "sw":
						search_words=decodeURIComponent(param_arg_values[1]);
						break;
					case "page":
						current_page=param_arg_values[1];
						break;
					case "info":
						display_info=param_arg_values[1];
						break;
					case "mode":
						current_mode=param_arg_values[1];
						break;
					case "order":
						current_order=param_arg_values[1];
						break;
					case "sort":
						current_sort=param_arg_values[1];
						break;
				}
			}
		}

		function testKeyCode(e) {
			var keycode;
			if (window.event) keycode = window.event.keyCode;
			else if (e) keycode = e.which;
			var e = e || window.event;

			//Don't enable shortcut keys in Input, Textarea fields
			var element;
			if(e.target) element=e.target;
			else if(e.srcElement) element=e.srcElement;
			if(element.nodeType==3) element=element.parentNode;
			if(element.tagName == 'INPUT' || element.tagName == 'TEXTAREA') return;

			if(keycode==88 && current_page>1){//Previous Page: X
				goToLinkWithParameters (search_words,current_page-1);
			}
			if(keycode==67 && current_page<total_pages){//Next Page: C
				goToLinkWithParameters (search_words,current_page+1);
			}
			if(keycode==90 && current_page>1){//First Page: Z
				goToLinkWithParameters (search_words,1);
			}
			if(keycode==86 && current_page<total_pages){//Last Page: V
				goToLinkWithParameters (search_words,total_pages);
			}
			if(keycode==82){//Random Play: R
				randomPlay();
			}
			if(keycode==70){//Show or Hide Search Suggestion: F
				showHideDiv1('searchsuggestion_box');
				displaySearchSuggestion();
			}
			if(keycode==68){//Display All Videos: D
				if(search_words != "")
					goToLinkWithParameters("","");
			}
			if(keycode==83){// Show or Hide Video Info: S
				if(current_mode == 1)
					showHideDiv('info_block');
			}
			if(keycode==65){// Switch mode: A
				switchMode();
			}
		}

			link += "&info=" + display_info + "&mode=" + current_mode + "&order=" + current_order + "&sort=" + current_sort;
			window.location.href = link;
		}

				if(videos.length > 0) {
					var actor_array = [], maker_array=[], year_array = [], genre_array = [], other_array = [];

					for(var i=0;i<videos.length;i++) {
						getVideoInfo(i);

						if(actor != "") {
							var actors = actor.split(/\s*[&+,、()（）]+\s*/);
							actor_array = actor_array.concat(actors);
						}
						if(maker != "") {
							var makers = maker.split(/\s*[&+,、()（）]+\s*/);
							maker_array = maker_array.concat(makers);
						}
						if(date != "") {
							var year = date.match(/\d{4}/);
							if (year != null)
								year_array.push(year);
						}
						if(genre != "") {
							var genres = genre.split(/\s*[&+,、()（）]+\s*/);
							genre_array = genre_array.concat(genres);
						}
						if(title != "") {
							var others = title.match(/\(([^\[\]\(\)]+)\)|\[([^\[\]\(\)]+)\]/g);
							if(others != null)
								other_array = other_array.concat(others);
						}
					}

					if(actor_array.length == 0 && maker_array.length == 0 && year_array.length == 0 && genre_array.length == 0 && other_array.length == 0) {
						document.getElementById('searchsuggestion_box').innerHTML = "無";
					}
					else {
						for(var i=0; i < other_array.length; i++) {
							other_array[i] = other_array[i].replace(/\(|\)|\[|\]/g, '');
						}

						actor_array = eliminateDuplicates(actor_array).sort(dynamicSort());
						maker_array = eliminateDuplicates(maker_array).sort(dynamicSort());
						year_array  = eliminateDuplicates(year_array).sort(dynamicSort());
						genre_array = eliminateDuplicates(genre_array).sort(dynamicSort());
						other_array = eliminateDuplicates(other_array).sort(dynamicSort());

						other_array = diffArray(other_array,actor_array);
						other_array = diffArray(other_array,maker_array);
						other_array = diffArray(other_array,year_array);
						other_array = diffArray(other_array,genre_array);

						var searchsuggestion_box_html = "";
						if(actor_array.length > 0) searchsuggestion_box_html += "<div style=\"overflow:auto\"><u><b>演員</b></u><br />" + addSearchLinksForSuggestionBox (actor_array) + "</div>";
						if(maker_array.length > 0) searchsuggestion_box_html += "<div style=\"overflow:auto\"><u><b>片商</b></u><br />" + addSearchLinksForSuggestionBox (maker_array) + "</div>";
						if(year_array.length > 0) searchsuggestion_box_html += "<div style=\"overflow:auto\"><u><b>年份</b></u><br />" + addSearchLinksForSuggestionBox (year_array) + "</div>";
						if(genre_array.length > 0) searchsuggestion_box_html += "<div style=\"overflow:auto\"><u><b>類型</b></u><br />" + addSearchLinksForSuggestionBox (genre_array) + "</div>";
						if(other_array.length > 0) searchsuggestion_box_html += "<div style=\"overflow:auto\"><u><b>其他</b></u><br />" + addSearchLinksForSuggestionBox (other_array) + "</div>";
						document.getElementById('searchsuggestion_box').innerHTML = searchsuggestion_box_html;
					}
				}
				else {
					document.getElementById('searchsuggestion_box').innerHTML = "無";
				}
			}
		}

		function eliminateDuplicates(arr) {
			var i;
			var len=arr.length;
			var out=[];
			var obj={};

			for (i=0;i<len;i++) {
				if (!obj[arr[i]]) {
					obj[arr[i]]={};
					out.push(arr[i]);
				}
			}
			return out;
		}

		// diffArray(a, b) returns the result of the subtraction method applied to sets (mathematical concept).
		function diffArray(a, b) {
			var seen = [], diff = [];
			for ( var i = 0; i < b.length; i++)
				seen[b[i]] = true;
			for ( var i = 0; i < a.length; i++)
				if (!seen[a[i]])
					diff.push(a[i]);
			return diff;
		}

		function dynamicSort(key, descending) {
			var sortOrder = 1;
			if(descending == true) {
				sortOrder = -1;
			}
			return function (a,b) {
				if(!(key == null || key == "")) {
					a = a[key];
					b = b[key];
				}
				if(typeof a === 'string' && typeof b === 'string') {
					a = a.toLowerCase();
					b = b.toLowerCase();
				}
				var result = (a < b) ? -1 : (a > b) ? 1 : 0;
				return result * sortOrder;
			}
		}

		function humanFileSize(bytes, si) {
			var thresh = si ? 1000 : 1024;
			if(Math.abs(bytes) < thresh) {
				return bytes + ' B';
			}
			var units = si
				? ['kB','MB','GB','TB','PB','EB','ZB','YB']
				: ['KiB','MiB','GiB','TiB','PiB','EiB','ZiB','YiB'];
			var u = -1;
			do {
				bytes /= thresh;
				++u;
			} while(Math.abs(bytes) >= thresh && u < units.length - 1);
			return bytes.toFixed(1)+' '+units[u];
		}

		// pseudo random number generator
		function mulberry32(a) {
			return function() {
				var t = a += 0x6D2B79F5;
				t = Math.imul(t ^ t >>> 15, t | 1);
				t ^= t + Math.imul(t ^ t >>> 7, t | 61);
				return ((t ^ t >>> 14) >>> 0) / 4294967296;
			}
		}
		var d = new Date();
		var seed = d.getFullYear()*10000 + (d.getMonth()+1)*100 + d.getDate();
		Math.seedRandom = mulberry32(seed);

		function shuffleArray(array) {
			for (var i = array.length - 1; i > 0; i--) {
				var j = Math.floor(Math.seedRandom() * (i + 1));
				var temp = array[i];
				array[i] = array[j];
				array[j] = temp;
			}
		}
